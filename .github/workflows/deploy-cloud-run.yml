name: Deploy to Cloud Run

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  actions: read

env:
  IMAGE_TAG: ${{ github.sha }}

jobs:
  check-ci:
    name: Require CI success
    runs-on: ubuntu-latest
    steps:
      - name: Verify CI passed for this commit
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const response = await github.rest.actions.listWorkflowRuns({
              owner,
              repo,
              workflow_id: "ci.yml",
              head_sha: context.sha,
              status: "completed",
              per_page: 20,
            });
            const passed = response.data.workflow_runs.some(
              (run) => run.conclusion === "success"
            );
            if (!passed) {
              core.setFailed(`CI has not passed for ${context.sha}. Run CI successfully before deploying.`);
            }

  deploy:
    name: Build, deploy, and smoke test
    runs-on: ubuntu-latest
    needs: check-ci
    environment: production
    steps:
      - uses: actions/checkout@v4

      - id: auth
        name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${{ vars.GCP_REGION }}-docker.pkg.dev" --quiet

      - name: Build and push image
        env:
          IMAGE: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.CLOUD_RUN_SERVICE }}/${{ vars.CLOUD_RUN_SERVICE }}:${{ env.IMAGE_TAG }}
        run: |
          docker build -t "$IMAGE" .
          docker push "$IMAGE"

      - name: Deploy Cloud Run revision
        env:
          IMAGE: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.CLOUD_RUN_SERVICE }}/${{ vars.CLOUD_RUN_SERVICE }}:${{ env.IMAGE_TAG }}
        run: |
          gcloud run deploy "${{ vars.CLOUD_RUN_SERVICE }}" \
            --project "${{ vars.GCP_PROJECT_ID }}" \
            --region "${{ vars.GCP_REGION }}" \
            --image "$IMAGE" \
            --platform managed \
            --allow-unauthenticated \
            --memory 2Gi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 2 \
            --set-env-vars "QDRANT_MODE=server,MODEL_WARMUP_ENABLED=false,RERANKING_ENABLED=false,OPENAI_MODEL=${{ vars.OPENAI_MODEL }},QDRANT_CLOUD_URL=${{ vars.QDRANT_CLOUD_URL }}" \
            --set-secrets "OPENAI_API_KEY=OPENAI_API_KEY:latest,QDRANT_API_KEY=QDRANT_API_KEY:latest,SESSION_SIGNING_SECRET=SESSION_SIGNING_SECRET:latest" \
            --quiet

      - name: Smoke test deployed service
        run: |
          SERVICE_URL="$(gcloud run services describe "${{ vars.CLOUD_RUN_SERVICE }}" --project "${{ vars.GCP_PROJECT_ID }}" --region "${{ vars.GCP_REGION }}" --format='value(status.url)')"
          export SERVICE_URL
          echo "SERVICE_URL=$SERVICE_URL" >> "$GITHUB_ENV"
          python - <<'PY'
          import json
          import os
          import time
          import urllib.request

          service_url = os.environ["SERVICE_URL"].rstrip("/")
          health_url = f"{service_url}/health"
          last_error = None
          for _ in range(24):
              try:
                  with urllib.request.urlopen(health_url, timeout=15) as response:
                      body = json.loads(response.read().decode("utf-8"))
                  expected = {
                      "status": "ok",
                      "collection_ready": True,
                      "lexical_ready": True,
                      "lexical_record_count": 463,
                  }
                  failures = [
                      f"{key} expected {value!r}, got {body.get(key)!r}"
                      for key, value in expected.items()
                      if body.get(key) != value
                  ]
                  if failures:
                      raise RuntimeError("; ".join(failures))
                  break
              except Exception as exc:
                  last_error = exc
                  time.sleep(5)
          else:
              raise SystemExit(f"Health check failed: {last_error}")

          with urllib.request.urlopen(service_url, timeout=15) as response:
              if response.status != 200:
                  raise SystemExit(f"Root URL returned HTTP {response.status}")
          print(f"Smoke checks passed for {service_url}")
          PY
