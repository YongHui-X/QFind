services:
  qdrant:
    image: qdrant/qdrant:v1.18.0
    container_name: clauselens-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - clauselens-qdrant-data:/qdrant/storage
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -c 'exec 3<>/dev/tcp/127.0.0.1/6333 && printf \"GET /healthz HTTP/1.0\\r\\n\\r\\n\" >&3 && grep -q \"200\" <&3'",
        ]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  clauselens-qdrant-data:
